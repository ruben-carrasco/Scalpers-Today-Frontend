<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#000000"/>
  <defs>
    <linearGradient id="scalperGradient" x1="200" y1="800" x2="800" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <linearGradient id="scalperGradientDark" x1="200" y1="800" x2="800" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E3A8A" />
      <stop offset="100%" stop-color="#4C1D95" />
    </linearGradient>
  </defs>

  <!-- Sombra exterior para dar profundidad (Neón) -->
  <path d="M680 200 L850 200 L450 824 L280 824 Z" fill="url(#scalperGradientDark)" opacity="0.5" filter="blur(20px)" />
  <path d="M480 200 L650 200 L250 824 L80 824 Z" fill="url(#scalperGradientDark)" opacity="0.5" filter="blur(20px)" />

  <!-- Forma principal 'S' de Scalper: Dos flechas afiladas y diagonales -->
  <!-- Flecha Derecha/Arriba (Alcista) -->
  <path d="M500 250 L800 250 L600 560 L450 560 Z" fill="url(#scalperGradient)" />
  <!-- Flecha Izquierda/Abajo (Base de la S) -->
  <path d="M420 480 L570 480 L350 780 L180 780 Z" fill="url(#scalperGradient)" />
  
  <!-- Detalle central de corte para separar ambas formas -->
  <path d="M400 520 L620 520" stroke="#000000" stroke-width="40" stroke-linecap="round" />
</svg>